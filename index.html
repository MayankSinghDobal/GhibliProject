<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Studio Ghibli</title>
    <link
      rel="shortcut icon"
      href="https://mchlln.gallerycdn.vsassets.io/extensions/mchlln/vscode-ghibli-icon-theme/0.0.2/1676549382664/Microsoft.VisualStudio.Services.Icons.Default"
      type="image/x-icon"
    />
    <style>
      * {
        margin: 0px;
        padding: 0px;
        box-sizing: border-box;
      }
      html,
      body {
        width: 100%;
        height: 100%;
      }
      #container {
        width: 100vw;
        height: 100vh;
        display: flex;
        flex-direction: row;
        justify-content: flex-start;
        position: relative;
      }
      .ghibli {
        height: 100%;
        width: 100%;
      }
      .ghibli img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }
      @font-face {
        font-family: Ghibli;
        src: url(./Eyad\ Al-Samman\ -\ Ghibli.otf);
      }
      @font-face {
        font-family: GHIBLI;
        src: url(./Eyad\ Al-Samman\ -\ Ghibli-Bold.otf);
      }

      h3:hover {
        color: white;
        background-color: aqua;
        transition: all 0.3s linear;
        transform: scale(1.2);
        box-shadow: 0px 0px 20px 20px #00bfff;
      }
      h1{
        text-align: center;
          margin-top: 40px;
          font-family: Ghibli;
          position: absolute;
          z-index: 10;
          left: 23%;
          top: 70px;
          font-size: 70px;
          transition: all 0.1s linear;
          color: transparent;
          -webkit-text-stroke: 2px rgb(255, 255, 255);
      }
      h1:hover {
        color: white;
        -webkit-text-stroke: 0.4px rgb(0, 0, 0);
        text-shadow: 0 0 20px #fbff91;
      }
    </style>
  </head>
  <body>
    <div id="container">
      <h1>
        Welcome to Ghibli Studio
      </h1>
      <audio src="./ATownWithAnOceanView.mp3" autoplay controls hidden style="position: absolute; z-index: 11;margin-left: 400px;"></audio>
      <div
        id="explore"
        style="
          position: absolute;
          z-index: 10;
          border: 5px solid black;
          left: 40%;
          margin-top: 350px;
        "
      >
        <h3 style="font-family: GHIBLI; font-size: 50px; cursor: pointer">
          Enjoy the Song
        </h3>
      </div>
      <div class="ghibli">
        <img src="./studioGhibli11.png" alt="no-image" />
      </div>
      <div class="ghibli">
        <img src="./studioGhibli22.jpg" alt="no-image" />
      </div>
      <div class="ghibli">
        <img src="./studioGhibli33.png" alt="no-image" />
      </div>
      <div class="ghibli">
        <img src="./studioGhibli44.png" alt="no-image" />
      </div>
    </div>
  </body>
</html>
